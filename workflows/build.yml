name: build

on:
  push:
  pull_request:

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Получить исходники
        uses: actions/checkout@v4

      - name: Установить Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Проверить gofmt
        run: test -z "$(gofmt -l .)"

      - name: Запустить тесты
        run: go test ./...

      - name: Собрать Linux amd64
        run: go build -o dist/tunnelctl-linux-amd64 ./cmd/tunnelctl