name: Подготовить версию и AGENTS

on:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: write

jobs:
  update:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/version-agents'
    runs-on: ubuntu-latest
    steps:
      - name: Получить ветку
        uses: actions/checkout@v4
        with:
          ref: agent/version-agents
          fetch-depth: 0

      - name: Настроить Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Обновить версию и правила
        shell: bash
        env:
          AGENTS_GZ_B64: ''
        run: |
          python3 - <<'PY'
          import base64
          import gzip
          import os
          from pathlib import Path

          app = Path('internal/app/app.go')
          text = app.read_text(encoding='utf-8')
          old = 'const Version = "0.2.0"'
          new = 'const Version = "0.3.0"'
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'ожидалась одна строка {old!r}, найдено {count}')
          app.write_text(text.replace(old, new), encoding='utf-8')
          Path('AGENTS.md').write_bytes(gzip.decompress(base64.b64decode(os.environ['AGENTS_GZ_B64'])))
          Path('.github/workflows/version-agents-bootstrap.yml').unlink()
          PY

      - name: Проверить форматирование и тесты
        shell: bash
        run: |
          gofmt -w internal/app/app.go
          git diff --check
          go test ./...
          go vet ./...
          go build -o "$RUNNER_TEMP/tunnelctl-linux" ./cmd/tunnelctl
          GOOS=windows GOARCH=amd64 go build -o "$RUNNER_TEMP/tunnelctl.exe" ./cmd/tunnelctl
          GOOS=android GOARCH=arm64 go build -o "$RUNNER_TEMP/tunnelctl-android" ./cmd/tunnelctl

      - name: Создать и отправить коммит
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AGENTS.md internal/app/app.go .github/workflows/version-agents-bootstrap.yml
          git diff --cached --check
          git commit -m "Обновлена версия и добавлены правила проекта"
          git push origin HEAD:agent/version-agents
