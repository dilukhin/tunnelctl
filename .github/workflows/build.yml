name: build

on:
  push:
  pull_request:

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Получить исходники
        uses: actions/checkout@v4

      - name: Установить Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Проверить gofmt
        run: test -z "$(gofmt -l .)"

      - name: Запустить тесты
        run: go test ./...

      - name: Запустить go vet
        run: go vet ./...

      - name: Собрать Linux amd64
        run: GOOS=linux GOARCH=amd64 go build -o dist/tunnelctl-linux-amd64 ./cmd/tunnelctl

      - name: Собрать Windows amd64
        run: GOOS=windows GOARCH=amd64 go build -o dist/tunnelctl-windows-amd64.exe ./cmd/tunnelctl

      - name: Собрать Android arm64
        run: GOOS=android GOARCH=arm64 go build -o dist/tunnelctl-android-arm64 ./cmd/tunnelctl

  integration-docker:
    name: Docker integration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Получить исходники
        uses: actions/checkout@v4

      - name: Установить Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Запустить Docker-интеграцию
        run: bash tests/integration/docker/run.sh
