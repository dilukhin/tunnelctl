name: build

on:
  push:
  pull_request:

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Получить исходники
        uses: actions/checkout@v4

      - name: Установить Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Проверить gofmt
        run: |
          files="$(gofmt -l .)"
          printf '%s\n' "$files" > gofmt-files.txt
          gofmt -d . > gofmt.patch || true
          if [ -n "$files" ]; then
            echo "Следующие файлы требуют gofmt:"
            echo "$files"
            exit 1
          fi

      - name: Сохранить диагностику gofmt
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gofmt-files
          path: |
            gofmt-files.txt
            gofmt.patch

      - name: Запустить тесты
        run: |
          set -o pipefail
          go test ./... 2>&1 | tee go-test.log

      - name: Сохранить журнал упавших тестов
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: go-test-log
          path: go-test.log

      - name: Запустить go vet
        run: go vet ./...

      - name: Собрать Linux amd64
        run: GOOS=linux GOARCH=amd64 go build -o dist/tunnelctl-linux-amd64 ./cmd/tunnelctl

      - name: Собрать Windows amd64
        run: GOOS=windows GOARCH=amd64 go build -o dist/tunnelctl-windows-amd64.exe ./cmd/tunnelctl

      - name: Собрать Android arm64
        run: GOOS=android GOARCH=arm64 go build -o dist/tunnelctl-android-arm64 ./cmd/tunnelctl

  test-windows:
    name: Windows import tests
    runs-on: windows-latest
    steps:
      - name: Получить исходники
        uses: actions/checkout@v4

      - name: Установить Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Проверить импорт Far и Total Commander
        shell: cmd
        run: go test ./internal/historyscan ./cmd/tunnelctl

  integration-docker:
    name: Docker integration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Получить исходники
        uses: actions/checkout@v4

      - name: Установить Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Запустить Docker-интеграцию
        run: bash tests/integration/docker/run.sh
