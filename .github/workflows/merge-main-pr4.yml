name: Временное слияние main в PR 4

on:
  push:
    branches:
      - agent/restart-versioning

permissions:
  contents: write

jobs:
  merge-main:
    name: Слить main и проверить результат
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Получить полную историю
        uses: actions/checkout@v4
        with:
          ref: agent/restart-versioning
          fetch-depth: 0

      - name: Установить Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Слить main и разрешить ожидаемые конфликты
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          expected_main="51fdda6bde1ef93af9721dd36e41ebd4bf4f3f0c"
          actual_main="$(git rev-parse origin/main)"
          if [ "$actual_main" != "$expected_main" ]; then
            echo "main изменился: ожидался $expected_main, получен $actual_main"
            exit 1
          fi

          set +e
          git merge --no-ff --no-commit origin/main
          merge_code=$?
          set -e

          conflicts="$(git diff --name-only --diff-filter=U | sort)"
          expected_conflicts="$(printf '%s\n' \
            cmd/tunnelctl/main.go \
            cmd/tunnelctl/main_test.go \
            internal/logx/logx.go \
            internal/logx/logx_test.go | sort)"
          if [ "$conflicts" != "$expected_conflicts" ]; then
            echo "Неожиданный набор конфликтов:"
            printf '%s\n' "$conflicts"
            exit 1
          fi
          if [ "$merge_code" -eq 0 ]; then
            echo "Ожидались конфликты, но git merge завершился без них"
            exit 1
          fi

          python3 - <<'PY'
          import base64
          from pathlib import Path

          files = {
              "cmd/tunnelctl/main.go": "",
              "cmd/tunnelctl/main_test.go": "",
              "internal/logx/logx.go": "   ",
              "internal/logx/logx_test.go": "  "
          }
          for path, data in files.items():
              target = Path(path)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_bytes(base64.b64decode(data))
          PY

          gofmt -w \
            cmd/tunnelctl/main.go \
            cmd/tunnelctl/main_test.go \
            internal/logx/logx.go \
            internal/logx/logx_test.go

          git add -A
          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "Остались неразрешённые конфликты"
            git diff --name-only --diff-filter=U
            exit 1
          fi
          git diff --cached --check
          if git grep -n -e '^<<<<<<< ' -e '^=======$' -e '^>>>>>>> ' -- '*.go'; then
            echo "Найдены маркеры конфликта"
            exit 1
          fi

      - name: Запустить тесты и сборки
        shell: bash
        run: |
          set -euo pipefail
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "Следующие файлы требуют gofmt:"
            echo "$files"
            exit 1
          fi
          go test ./...
          go vet ./...
          GOOS=linux GOARCH=amd64 go build -o /tmp/tunnelctl-linux-amd64 ./cmd/tunnelctl
          GOOS=windows GOARCH=amd64 go build -o /tmp/tunnelctl-windows-amd64.exe ./cmd/tunnelctl
          GOOS=android GOARCH=arm64 go build -o /tmp/tunnelctl-android-arm64 ./cmd/tunnelctl
          bash tests/integration/docker/run.sh

      - name: Создать и отправить merge-коммит
        shell: bash
        run: |
          set -euo pipefail
          git commit -m "Слит main в PR #4 с разрешением конфликтов"
          git push origin HEAD:agent/restart-versioning
