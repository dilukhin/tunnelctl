name: Временное обновление версии

on:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: write

jobs:
  bump-version:
    if: github.head_ref == 'agent/bump-version-0.3.0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Обновить версию приложения
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's/const Version = "0\.2\.0"/const Version = "0.3.0"/' internal/app/app.go
          grep -F 'const Version = "0.3.0"' internal/app/app.go
      - name: Проверить изменение
        run: |
          gofmt -w internal/app/app.go
          go test ./internal/app ./cmd/tunnelctl
      - name: Зафиксировать изменение
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add internal/app/app.go
          git commit -m 'Версия повышена до 0.3.0'
          git push origin HEAD:${{ github.head_ref }}
