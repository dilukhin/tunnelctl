services:
  target:
    image: python:3.13-alpine
    command: ["python", "-m", "http.server", "8080", "--directory", "/srv"]
    volumes:
      - ./target:/srv:ro
    expose:
      - "8080"
    networks:
      - tunnel

  ssh-one:
    build:
      context: .
      dockerfile: Dockerfile.sshd
    volumes:
      - ${TUNNELCTL_TEST_TMP:?TUNNELCTL_TEST_TMP is required}/id_ed25519.pub:/run/keys/id_ed25519.pub:ro
    ports:
      - "127.0.0.1:22221:22"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 22"]
      interval: 1s
      timeout: 1s
      retries: 20
    networks:
      - tunnel

  ssh-two:
    build:
      context: .
      dockerfile: Dockerfile.sshd
    volumes:
      - ${TUNNELCTL_TEST_TMP:?TUNNELCTL_TEST_TMP is required}/id_ed25519.pub:/run/keys/id_ed25519.pub:ro
    ports:
      - "127.0.0.1:22222:22"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 22"]
      interval: 1s
      timeout: 1s
      retries: 20
    networks:
      - tunnel

networks:
  tunnel:
